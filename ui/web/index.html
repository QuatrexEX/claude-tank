<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/gauges.css">
  <link rel="stylesheet" href="css/theme-cyber.css">
  <style>
    body { padding: 24px; overflow-y: auto; }
    .dashboard { max-width: 440px; margin: 0 auto; }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .header h1 { font-size: 18px; color: var(--accent); }
    .header .plan-badge {
      font-size: 11px;
      padding: 4px 10px;
      background: var(--accent);
      color: var(--bg-primary);
      border-radius: 12px;
      font-weight: 600;
    }
    .section { margin-bottom: 20px; }
    .section .card { margin-bottom: 12px; }
    .footer {
      margin-top: 24px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>
<body class="theme-cyber">
  <div class="dashboard fade-in">
    <div class="header">
      <h1>Claude Tank</h1>
      <span class="plan-badge" id="plan-name">—</span>
    </div>

    <div class="section">
      <div class="card" id="gauge-5h"></div>
      <div class="card" id="gauge-7d"></div>
    </div>

    <div class="section" id="model-gauges"></div>

    <div class="section card" id="extra-usage" style="display:none"></div>

    <div class="footer">
      <span id="last-updated"></span>
      <span>Quatrex / Claude Tank v1.0</span>
    </div>
  </div>

  <script src="js/gauges.js"></script>
  <script src="js/themes.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
